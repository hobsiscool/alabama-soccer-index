services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: soccerpassword
      POSTGRES_DB: soccer_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  scraper:
    build: ./scraper
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://admin:soccerpassword@db:5432/soccer_db

  web:
    build: ./web
    ports:
      - "8501:8501"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://admin:soccerpassword@db:5432/soccer_db
volumes:
  postgres_data: